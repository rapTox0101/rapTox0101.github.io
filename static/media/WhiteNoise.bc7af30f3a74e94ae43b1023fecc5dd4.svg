<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 600 600">

  <!-- Noise filter -->
  <filter id="bwNoise" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" stitchTiles="stitch" result="turb"/>
    <feColorMatrix in="turb" type="saturate" values="0" result="mono"/>
    <feComponentTransfer in="mono" result="thresh">
      <feFuncR type="table" tableValues="0 1"/>
      <feFuncG type="table" tableValues="0 1"/>
      <feFuncB type="table" tableValues="0 1"/>
    </feComponentTransfer>
  </filter>

  <!-- Sphere with shading -->
  <defs>
    <!-- Radial gradient for shading -->
    <radialGradient id="sphereShade" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="black" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Clip circle -->
    <clipPath id="clipCircle">
      <circle cx="300" cy="300" r="250"/>
    </clipPath>
  </defs>

  <!-- Static + sphere shading combined -->
  <g clip-path="url(#clipCircle)">
    <rect width="100%" height="100%" filter="url(#bwNoise)"/>
    <circle cx="300" cy="300" r="250" fill="url(#sphereShade)"/>
  </g>

  <!-- Outer stroke of sphere -->
  <circle cx="300" cy="300" r="250" fill="none" stroke="black" stroke-width="3" opacity="0.6"/>

</svg>
