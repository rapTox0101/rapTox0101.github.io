<svg width="90" height="90" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Sphere -->
  <circle cx="100" cy="100" r="90" fill="url(#grad2)" stroke="#333" stroke-width="3"/>
  
  <!-- Gradient for sphere effect -->
  <defs>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e9bbbb; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000; stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Letters inside the sphere -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white">
    G2
  </text>
</svg>
