<svg xmlns="http://www.w3.org/2000/svg" width="110" height="110" viewBox="0 0 500 500">

  <defs>
    <!-- Noise → grayscale → blockify -->
    <filter id="blockNoise" x="0" y="0" width="100%" height="100%">
      
      <!-- Lower = larger chunks; 0.12 gives big blocks -->
      <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="1" result="noise"/>

      <!-- Map turbulence to black/gray/white (3-step) -->
      <feComponentTransfer result="gray">
        <feFuncR type="table" tableValues="0 0.5 1"/>
        <feFuncG type="table" tableValues="0 0.5 1"/>
        <feFuncB type="table" tableValues="0 0.5 1"/>
      </feComponentTransfer>

      <!-- Makes blocks thick and square -->
      <feMorphology operator="dilate" radius="10" />
    </filter>

    <!-- shading for sphere -->
    <radialGradient id="shade" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-opacity="0.8" stop-color="white"/>
      <stop offset="100%" stop-opacity="0.1" stop-color="black"/>
    </radialGradient>

    <clipPath id="clipSphere">
      <circle cx="250" cy="250" r="200"/>
    </clipPath>
  </defs>

  <circle cx="250" cy="250" r="200" fill="white"/>

  <g clip-path="url(#clipSphere)">
    <rect x="0" y="0" width="500" height="500" filter="url(#blockNoise)"/>
    <circle cx="250" cy="250" r="200" fill="url(#shade)" style="mix-blend-mode:multiply"/>
  </g>

  <circle cx="250" cy="250" r="200" fill="none" stroke="black" stroke-opacity="0.2"/>
</svg>
