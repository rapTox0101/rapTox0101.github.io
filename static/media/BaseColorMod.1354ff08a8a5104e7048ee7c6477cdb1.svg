<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Triangular RGB gradient via blended linear gradients -->
    <linearGradient id="gradR" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="red"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <linearGradient id="gradG" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="green"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <linearGradient id="gradB" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="blue"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- Mask to make gradients circular -->
    <mask id="sphereMask">
      <circle cx="200" cy="200" r="180" fill="white"/>
    </mask>

    <!-- Softer, subtler highlight -->
    <radialGradient id="highlight" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Combined RGB gradients -->
  <g mask="url(#sphereMask)" opacity="0.95">
    <rect width="400" height="400" fill="url(#gradR)"/>
    <rect width="400" height="400" fill="url(#gradG)" style="mix-blend-mode:screen;"/>
    <rect width="400" height="400" fill="url(#gradB)" style="mix-blend-mode:screen;"/>
  </g>

  <!-- Softer spherical highlight -->
  <circle cx="200" cy="200" r="180" fill="url(#highlight)" />

  <!-- Optional thin outline -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#000" stroke-opacity="0.08"/>
</svg>
